<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cờ Caro Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="bg-layer"></div>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Cờ Caro</h1>
        </div>
        <p class="room-id" id="roomId"></p>
        <button id="createRoomBtn" class="create-room-btn" type="button">TẠO PHÒNG</button>
        <button id="joinRoomBtn" class="join-room-btn" type="button">THAM GIA PHÒNG</button>
        <button id="leaveRoomBtn" class="leave-room-btn" type="button" disabled>RỜI PHÒNG</button>
        <button id="restartBtn" class="restart-btn" type="button">VÁN MỚI</button>
      </header>

      <section class="panel">
        <div class="status-wrap">
          <p class="label">Lượt hiện tại</p>
          <p id="currentPlayer" class="value player-x">X</p>
        </div>
        <div class="status-wrap">
          <p class="label">Số nước đã đánh</p>
          <p id="moveCount" class="value">0</p>
        </div>
        <div class="status-wrap status-message">
          <p class="label">Trạng thái</p>
          <p id="message" class="value message">Sẵn sàng bắt đầu</p>
        </div>
      </section>

      <section class="board-wrap">
        <div id="board" class="board" aria-label="Bàn cờ caro"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
